<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Account - WellnessHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

    <!-- PWA: manifest + icons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-180.png">

    <!-- PWA: iOS standalone app support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WellnessHub">

    <!-- PWA: Android/Chrome standalone app support -->
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body class="login-page register-page">

    <div class="login-bg" aria-hidden="true">
        <span class="login-bg-shape login-bg-shape--one"></span>
        <span class="login-bg-shape login-bg-shape--two"></span>
        <span class="login-bg-shape login-bg-shape--three"></span>
    </div>

    <main class="login-shell register-shell">
        <div class="login-card glass-card fade-in">
            <header class="login-header text-center">
                <a class="login-brand" href="/">
                    <i class="fa-solid fa-heart-pulse" aria-hidden="true"></i>
                    <span>WellnessHub</span>
                </a>
                <h1 class="login-title">Create your account</h1>
                <p class="login-subtitle">Start tracking your wellness in just a minute</p>
            </header>

            <div id="registerAlert" class="login-alert alert d-none" role="alert" aria-live="polite"></div>

            <form id="registerForm" class="login-form register-form" novalidate>
                <div class="form-group mb-3">
                    <label for="registerUsername" class="form-label login-label">Username</label>
                    <div class="input-group login-input-group">
                        <span class="input-group-text login-input-icon" aria-hidden="true">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input
                            type="text"
                            class="form-control login-input"
                            id="registerUsername"
                            name="username"
                            autocomplete="username"
                            placeholder="Choose a username"
                            required
                            minlength="3"
                            maxlength="50"
                            pattern="[A-Za-z0-9_]+"
                            aria-describedby="registerUsernameHelp registerUsernameFeedback"
                        >
                    </div>
                    <div id="registerUsernameHelp" class="form-text register-help">3–50 characters. Letters, numbers, and underscores only.</div>
                    <div id="registerUsernameFeedback" class="invalid-feedback login-field-error" role="alert"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="registerEmail" class="form-label login-label">Email address</label>
                    <div class="input-group login-input-group">
                        <span class="input-group-text login-input-icon" aria-hidden="true">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input
                            type="email"
                            class="form-control login-input"
                            id="registerEmail"
                            name="email"
                            autocomplete="email"
                            inputmode="email"
                            placeholder="you@example.com"
                            required
                            maxlength="100"
                            aria-describedby="registerEmailFeedback"
                        >
                    </div>
                    <div id="registerEmailFeedback" class="invalid-feedback login-field-error" role="alert"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="registerPassword" class="form-label login-label">Password</label>
                    <div class="input-group login-input-group">
                        <span class="input-group-text login-input-icon" aria-hidden="true">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input
                            type="password"
                            class="form-control login-input login-input-password"
                            id="registerPassword"
                            name="password"
                            autocomplete="new-password"
                            placeholder="Create a password"
                            required
                            minlength="6"
                            aria-describedby="registerPasswordHelp registerPasswordFeedback registerPasswordToggleHint"
                        >
                        <button
                            type="button"
                            class="btn login-password-toggle touch-target"
                            id="registerPasswordToggle"
                            aria-label="Show password"
                            aria-pressed="false"
                            aria-controls="registerPassword"
                        >
                            <i class="fa-solid fa-eye" id="registerPasswordToggleIcon" aria-hidden="true"></i>
                        </button>
                    </div>
                    <span id="registerPasswordToggleHint" class="visually-hidden">Password visibility can be toggled</span>
                    <div id="registerPasswordHelp" class="form-text register-help">At least 6 characters.</div>
                    <div id="registerPasswordFeedback" class="invalid-feedback login-field-error" role="alert"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="registerConfirmPassword" class="form-label login-label">Confirm password</label>
                    <div class="input-group login-input-group">
                        <span class="input-group-text login-input-icon" aria-hidden="true">
                            <i class="fa-solid fa-shield-halved"></i>
                        </span>
                        <input
                            type="password"
                            class="form-control login-input login-input-password"
                            id="registerConfirmPassword"
                            name="confirmPassword"
                            autocomplete="new-password"
                            placeholder="Re-enter your password"
                            required
                            minlength="6"
                            aria-describedby="registerConfirmPasswordFeedback registerConfirmToggleHint"
                        >
                        <button
                            type="button"
                            class="btn login-password-toggle touch-target"
                            id="registerConfirmToggle"
                            aria-label="Show confirm password"
                            aria-pressed="false"
                            aria-controls="registerConfirmPassword"
                        >
                            <i class="fa-solid fa-eye" id="registerConfirmToggleIcon" aria-hidden="true"></i>
                        </button>
                    </div>
                    <span id="registerConfirmToggleHint" class="visually-hidden">Confirm password visibility can be toggled</span>
                    <div id="registerConfirmPasswordFeedback" class="invalid-feedback login-field-error" role="alert"></div>
                </div>

                <div class="form-check login-remember register-terms mb-4">
                    <input class="form-check-input" type="checkbox" id="acceptTerms" name="acceptTerms" required aria-describedby="acceptTermsFeedback">
                    <label class="form-check-label" for="acceptTerms">
                        I agree to the <a href="#" class="login-link">Terms of Service</a> and <a href="#" class="login-link">Privacy Policy</a>
                    </label>
                    <div id="acceptTermsFeedback" class="invalid-feedback login-field-error register-terms-error d-none" role="alert"></div>
                </div>

                <button type="submit" class="btn btn-primary login-submit touch-btn w-100" id="registerSubmitBtn">
                    <span class="login-submit-text">Create Account</span>
                    <span class="login-submit-spinner spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </form>

            <p class="login-footer text-center mb-0">
                Already have an account?
                <a href="login.html" class="login-link">Sign in</a>
            </p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
